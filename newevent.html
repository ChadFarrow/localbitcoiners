<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Pragmatic baseline CSP. See index.html for the rationale; both
       pages share the same policy intentionally so future tightening
       happens in lockstep. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https:;
    font-src 'self' data:;
    connect-src 'self' https: wss:;
    frame-ancestors 'none';
    base-uri 'self';
    form-action 'self';
    object-src 'none';
  " />

  <title>Submit a Meetup — Local Bitcoiners</title>
  <meta name="description" content="Post your Bitcoin meetup to Nostr right from localbitcoiners.com. Sign in with your Nostr identity, fill in the details, and publish a NIP-52 calendar event in seconds." />
  <link rel="canonical" href="https://localbitcoiners.com/newevent" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1e3a5f" />
  <link rel="apple-touch-icon" href="/assets/LocalBitcoiners.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Local Bitcoiners" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://localbitcoiners.com/newevent" />
  <meta property="og:title" content="Submit a Meetup — Local Bitcoiners" />
  <meta property="og:description" content="Post your Bitcoin meetup to Nostr right from localbitcoiners.com." />
  <meta property="og:site_name" content="Local Bitcoiners" />
  <meta property="og:image" content="https://localbitcoiners.com/assets/LocalBitcoiners_banner_YT.jpg" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Self-hosted fonts (mirrors boosts.html). -->
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/source-serif-4.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/playfair-display.woff2" crossorigin />

  <style>
    @font-face {
      font-family: 'Playfair Display';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('assets/fonts/playfair-display.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Source Serif 4';
      font-style: normal;
      font-weight: 300 600;
      font-display: swap;
      src: url('assets/fonts/source-serif-4.woff2') format('woff2');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; max-width: 100vw; }

    :root {
      --cream:   #f5eedc;
      --cream-d: #ede3c8;
      --navy:    #1e3a5f;
      --orange:  #f7931a;
      --orange-d:#d97b0e;
      --text:    #2d2010;
      --muted:   #6b5a3e;
      --border:  #d4c4a0;
      --white:   #fffdf7;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.65;
      font-size: 17px;
    }
    a { color: var(--navy); text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: var(--orange); }
    img { display: block; max-width: 100%; }

    /* ── Nav (mirrors index.html / boosts.html) ── */
    #top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .nav-logo {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--orange);
    }
    .nav-logo img { width: 100%; height: 100%; object-fit: cover; }
    .nav-site-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.02em;
      text-decoration: none;
      flex: 1;
    }
    .nav-site-name:hover { color: var(--orange); }
    nav ul { list-style: none; display: flex; gap: 0.25rem; }
    nav ul li a {
      color: var(--cream-d);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }
    nav ul li a:hover { background: rgba(247,147,26,0.18); color: var(--orange); }
    nav ul li a.active { color: var(--orange); }

    #lb-boost-slot {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      min-height: 32px;
    }
    .lb-boost-placeholder {
      background: #f7931a;
      color: #ffffff;
      border: none;
      cursor: pointer;
      font: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.3rem 0.65rem;
      border-radius: 5px;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      transition: background 0.15s;
    }
    .lb-boost-placeholder:hover { background: #d97b0e; }
    .lb-boost-placeholder:disabled { opacity: 0.6; cursor: wait; }
    .lb-boost-placeholder svg { width: 11px; height: 11px; flex-shrink: 0; }
    .lb-boost-placeholder .lb-label-long { display: inline; }
    .lb-boost-placeholder .lb-label-short { display: none; }
    @media (max-width: 640px) {
      .lb-boost-placeholder .lb-label-long { display: none; }
      .lb-boost-placeholder .lb-label-short { display: inline; }
    }

    #lb-identity-slot {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      min-height: 32px;
    }
    .lb-identity-placeholder {
      background: rgba(255, 255, 255, 0.08);
      color: var(--cream);
      border: 1px solid rgba(255, 255, 255, 0.18);
      cursor: pointer;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.35rem 0.85rem;
      border-radius: 6px;
      transition: background 0.15s, border-color 0.15s;
    }
    .lb-identity-placeholder:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.32);
    }
    .lb-identity-restoring {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(90deg,
        rgba(255,255,255,0.05) 0%,
        rgba(255,255,255,0.15) 50%,
        rgba(255,255,255,0.05) 100%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.4s ease-in-out infinite;
    }
    @keyframes skeleton-shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* ── Page header ── */
    .page-header {
      background: var(--navy);
      color: var(--cream);
      padding: 3rem 1.5rem 2.5rem;
      text-align: center;
    }
    .page-header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }
    .page-header p {
      max-width: 700px;
      margin: 0.6rem auto 0;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--cream);
      font-style: italic;
    }

    /* ── Composer wrapper ── */
    .composer-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* The slot itself is dark-themed (Tailwind-class composer) — let it
       breathe inside the cream page background. */
    #lb-event-composer-slot { color-scheme: dark; }

    /* ── Footer ── */
    footer {
      background: #12253f;
      color: var(--muted);
      text-align: center;
      padding: 2rem 1.5rem;
      font-size: 0.85rem;
    }
    footer a { color: var(--orange); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 760px) {
      .nav-inner { gap: 0.5rem; flex-wrap: wrap; height: auto; padding: 0.6rem 1rem; }
      .nav-site-name { font-size: 1rem; flex: 1; min-width: 0; }
      nav { order: 4; flex-basis: 100%; }
      nav ul { justify-content: center; gap: 0.25rem; flex-wrap: wrap; }
      nav ul li a { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    }
    @media (max-width: 600px) {
      .composer-wrap { padding: 1.75rem 0.85rem 3rem; }
    }
    @media (max-width: 420px) {
      .nav-logo { width: 36px; height: 36px; }
      .nav-site-name { font-size: 0.92rem; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════ NAV ══════════════════════════════ -->
<header id="top-nav">
  <div class="nav-inner">
    <a class="nav-logo" href="/" aria-label="Local Bitcoiners home">
      <img src="assets/LocalBitcoiners.png" alt="Local Bitcoiners logo" />
    </a>
    <a class="nav-site-name" href="/">Local Bitcoiners</a>
    <nav aria-label="Main navigation">
      <ul>
        <li><a href="/#meetups">Resources</a></li>
        <li><a href="/#episodes">Episodes</a></li>
        <li><a href="/boosts.html">Boosts</a></li>
        <li><a href="/newevent" class="active">Submit a Meetup</a></li>
        <li><a href="/#links">Links</a></li>
      </ul>
    </nav>
    <div id="lb-boost-slot" aria-label="Boost the Show">
      <button
        type="button"
        class="lb-boost-placeholder"
        data-lb-boost-trigger="show"
        aria-label="Boost the Show"
      >
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M14.615 1.595a.75.75 0 0 1 .359.852L12.982 9.75h7.268a.75.75 0 0 1 .548 1.262l-10.5 11.25a.75.75 0 0 1-1.272-.71l1.992-7.302H3.75a.75.75 0 0 1-.548-1.262l10.5-11.25a.75.75 0 0 1 .913-.143Z" clip-rule="evenodd"/>
        </svg>
        <span class="lb-label-long">Boost the Show</span>
        <span class="lb-label-short">Boost</span>
      </button>
    </div>
    <div id="lb-identity-slot" aria-label="Account">
      <!-- Static placeholder swapped out by IdentityWidget once the
           bundle loads. Same pattern as boosts.html. -->
    </div>
  </div>
</header>

<!-- ══════════════════════════════ PAGE HEADER ══════════════════════════════ -->
<section class="page-header">
  <h1>Submit a Meetup</h1>
  <p>Sign in with nostr to post your Bitcoin meetup to Nostr - viewable on any client that supports NIP-52.</p>
</section>

<!-- ══════════════════════════════ COMPOSER ══════════════════════════════ -->
<section class="composer-wrap">
  <div id="lb-event-composer-slot">
    <!-- Composer + "boost an existing meetup" card are both mounted
         here by the login-widget bundle once it loads. -->
  </div>
</section>

<!-- ══════════════════════════════ FOOTER ══════════════════════════════ -->
<footer>
  <p>© 2026 Local Bitcoiners Podcast &nbsp;·&nbsp; <a href="mailto:localbitcoiners@gmail.com">localbitcoiners@gmail.com</a></p>
</footer>

<!-- Identity slot placeholder. Same pattern as boosts.html — eager-load
     the widget on this page since the composer IS the page content. -->
<script>
(function () {
  var slot = document.getElementById('lb-identity-slot');
  if (!slot) return;
  var hasSession = false;
  try { hasSession = !!localStorage.getItem('lb_nostr_session'); } catch (e) {}
  if (hasSession) {
    slot.innerHTML = '<div class="lb-identity-restoring" aria-label="Loading account"></div>';
  } else {
    slot.innerHTML = '<button type="button" class="lb-identity-placeholder" aria-label="Sign in with Nostr">Sign in</button>';
    var btn = slot.querySelector('button');
    btn.addEventListener('click', function () {
      if (window.LBLogin && typeof window.LBLogin.requestLogin === 'function') {
        window.LBLogin.requestLogin();
      }
    });
  }
})();
</script>

<!-- Boost-the-show placeholder click handler — same pattern as the
     home page. -->
<script>
(function () {
  var ph = document.querySelector('[data-lb-boost-trigger="show"]');
  if (!ph) return;
  ph.addEventListener('click', function () {
    if (window.LBLogin && typeof window.LBLogin.openShowBoost === 'function') {
      window.LBLogin.openShowBoost();
    }
  });
})();
</script>

<!-- Login widget (shared) — eager-loaded because the composer slot is
     this page's primary content. -->
<script src="assets/widgets/login-widget.js" defer></script>

<!-- PWA service worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>

<!-- PWA install affordance -->
<script src="assets/widgets/pwa-install.js" defer></script>
</body>
</html>
